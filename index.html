<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NYS Thruway Stops</title>
<link rel="manifest" href="manifest.json">

<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 16px;
    background: #111;
    color: #eee;
  }

  h1 {
    font-size: 18px;
    margin-bottom: 12px;
  }

  .routes {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }

  button {
    padding: 14px;
    font-size: 16px;
    border: 0;
    border-radius: 8px;
    background: #2b2b2b;
    color: white;
  }

  button.active {
    background: #0077ff;
  }

  .input {
    margin: 12px 0;
  }

  input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #000;
    color: #fff;
  }

  .result {
    margin-top: 16px;
    padding: 12px;
    background: #1b1b1b;
    border-radius: 8px;
    max-height: 70vh;
    overflow-y: auto;
  }

  .stop {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 16px;
    padding: 12px;
    border-left: 6px solid #555;
    border-bottom: 1px solid #333;
    border-radius: 4px;
    background: #1f1f1f;
  }

  .stop.service {
    border-left-color: #2ecc71;
  }

  .stop.rest {
    border-left-color: #f5a623;
  }

  .stop-left {
    flex: 1 1 auto;
    min-width: 0;
  }

  .stop-right {
    flex: 1 1 auto;
    min-width: 0;
    text-align: right;
  }

  .label {
    font-size: 20px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .name {
    font-size: 24px;
    font-weight: bold;
  }

  .meta {
    font-size: 20px;
    color: #aaa;
  }

  .food {
    font-size: 20px;
    color: #ccc;
    line-height: 1.4;
  }

  .empty-msg {
    font-size: 20px;
    color: #ccc;
    padding: 8px;
  }
</style>
</head>

<body>

<h1>NYS Thruway Stops</h1>

<div class="input">
  <input id="mile" type="number" placeholder="Enter mile marker" oninput="handleMileInput()" />
</div>

<div class="routes">
  <button onclick="setRoute('nw', this)">⬆️ N / W<br>(87N → 90W)</button>
  <button onclick="setRoute('se', this)">⬇️ E / S<br>(90E → 87S)</button>
</div>

<div id="output" class="result">Select route + mile marker</div>

<script>
let data = [];

async function loadData() {
    const response = await fetch("thruway.json");
    data = await response.json();
}

loadData();

let selectedRoute = null;

function setRoute(r, btn) {
  selectedRoute = r;
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  update();
}

const ROUTE_GROUPS = {
  nw: ["87N", "90W"],
  se: ["87S", "90E"]
};

const GROUP_INCREASING = {
  nw: true,
  se: false
};

function handleMileInput() {
  const val = document.getElementById("mile").value;
  if (val === "999") {
    forceRefresh();
    return;
  }
  update();
}

async function forceRefresh() {
  const out = document.getElementById("output");
  out.innerHTML = "Refreshing app from server…";

  try {
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map((k) => caches.delete(k)));
    }
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map((r) => r.unregister()));
    }
  } catch (e) {
    console.error("Force refresh failed:", e);
  }

  window.location.reload();
}

function update() {
  if (data.length === 0) return;

  const mile = parseFloat(document.getElementById("mile").value);
  const out = document.getElementById("output");

  if (!selectedRoute || isNaN(mile)) {
    out.innerHTML = "Select route + mile marker";
    return;
  }

  const increasing = GROUP_INCREASING[selectedRoute];

  const list = data
    .filter(d => ROUTE_GROUPS[selectedRoute].includes(d.route))
    .sort((a, b) => a.mile - b.mile);

  const index = list.findIndex(d =>
    increasing ? d.mile > mile : d.mile < mile
  );

  const remaining = index === -1 ? [] : list.slice(index);

  if (remaining.length === 0) {
    out.innerHTML = "No more stops ahead on this route — you've reached the end of our data.";
    return;
  }

  const upcoming = remaining.slice(0, 4);
  const labels = ["Next Stop", "2nd Stop", "3rd Stop", "4th Stop"];

  out.innerHTML = upcoming
    .map((stop, i) => renderStop(labels[i], stop, mile))
    .join("");

  if (upcoming.length < 4) {
    out.innerHTML += `<div class="empty-msg">Only ${upcoming.length} more stop${upcoming.length === 1 ? "" : "s"} on this route from here.</div>`;
  }
}

function renderStop(label, stop, current) {
  if (!stop) return "";

  const typeClass = stop.type === "rest" ? "rest" : "service";
  const foodHtml = stop.restaurants && stop.restaurants.length
    ? stop.restaurants.join("<br>")
    : "Rest area<br>No food";

  return `
    <div class="stop ${typeClass}">
      <div class="stop-left">
        <div class="label">${label}</div>
        <div class="name">${stop.name}</div>
        <div class="meta">MM ${stop.mile}<br>${Math.round(Math.abs(stop.mile - current) * 10) / 10} miles</div>
      </div>
      <div class="stop-right">
        <div class="food">${foodHtml}</div>
      </div>
    </div>
  `;
}

// service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
